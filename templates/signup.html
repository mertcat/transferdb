{% extends "base.html" %}
{% block title %} – Register{% endblock %}
{% block content %}
<div style="max-width:560px; margin:40px auto;">
<div class="card">
    <h1>Create Account</h1>
    <form method="POST" action="/signup" id="signupForm">

        <div class="form-row">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" id="roleSelect" required onchange="showRoleFields()">
                    <option value="">Select role…</option>
                    <option value="DatabaseManager">Database Manager</option>
                    <option value="Player">Player</option>
                    <option value="Manager">Manager</option>
                    <option value="Referee">Referee</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group" style="padding-top:18px; font-size:12px; color:var(--muted);">
                8+ chars · A-Z · a-z · 0-9 · special char
            </div>
        </div>

        <!-- Person fields (Player / Manager / Referee) -->
        <div id="personFields" style="display:none;">
            <hr style="border-color:var(--border); margin:14px 0;">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="name">
                </div>
                <div class="form-group">
                    <label>Surname</label>
                    <input type="text" name="surname">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Nationality</label>
                    <input type="text" name="nationality">
                </div>
                <div class="form-group">
                    <label>Date of Birth (YYYY-MM-DD)</label>
                    <input type="date" name="date_of_birth">
                </div>
            </div>
        </div>

        <!-- Player-specific -->
        <div id="playerFields" style="display:none;">
            <div class="form-row">
                <div class="form-group">
                    <label>Market Value (€)</label>
                    <input type="number" name="market_value" min="1">
                </div>
                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" name="height" min="100">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Main Position</label>
                    <select name="main_position">
                        <option value="Goalkeeper">Goalkeeper</option>
                        <option value="Defender">Defender</option>
                        <option value="Midfielder">Midfielder</option>
                        <option value="Forward">Forward</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Strong Foot</label>
                    <select name="strong_foot">
                        <option value="Right">Right</option>
                        <option value="Left">Left</option>
                        <option value="Both">Both</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Manager-specific -->
        <div id="managerFields" style="display:none;">
            <div class="form-row">
                <div class="form-group">
                    <label>Preferred Formation</label>
                    <input type="text" name="preferred_formation" placeholder="e.g. 4-3-3">
                </div>
                <div class="form-group">
                    <label>Experience Level</label>
                    <input type="text" name="experience_level" placeholder="e.g. Experienced">
                </div>
            </div>
        </div>

        <!-- Referee-specific -->
        <div id="refereeFields" style="display:none;">
            <div class="form-row">
                <div class="form-group">
                    <label>License Level</label>
                    <input type="text" name="license_level" placeholder="e.g. FIFA">
                </div>
                <div class="form-group">
                    <label>Years of Experience</label>
                    <input type="number" name="years_of_experience" min="0">
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">
            Create Account
        </button>
    </form>
    <p style="text-align:center; margin-top:14px; font-size:13px; color:var(--muted);">
        Already registered? <a href="/login" style="color:var(--accent2);">Sign in</a>
    </p>
</div>
</div>

<script>
function showRoleFields() {
    const role = document.getElementById('roleSelect').value;
    document.getElementById('personFields').style.display  = ['Player','Manager','Referee'].includes(role) ? '' : 'none';
    document.getElementById('playerFields').style.display  = role === 'Player'  ? '' : 'none';
    document.getElementById('managerFields').style.display = role === 'Manager' ? '' : 'none';
    document.getElementById('refereeFields').style.display = role === 'Referee' ? '' : 'none';
}
</script>
{% endblock %}
